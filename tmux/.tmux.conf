# set -g default-terminal "tmux-256color"
# set -ag terminal-overrides ",xterm-255color:RGB"

##### --- CATPPUCCIN LATTE THEME START --- #####
# Status bar
set -g status on
set -g status-interval 5
set -g status-style "bg=#eff1f5,fg=#4c4f69"

# Messages
set -g message-style "bg=#ccd0da,fg=#4c4f69"
set -g message-command-style "bg=#ccd0da,fg=#1e66f5"

# Panes Dividers
set -g pane-border-style "fg=#bcc0cc"
set -g pane-active-border-style "fg=#7287fd"

# Copy mode
setw -g mode-style "bg=#ccd0da,fg=#4c4f69"

# Window list
setw -g window-status-separator ""
setw -g window-status-style "bg=#eff1f5,fg=#6c6f85"
setw -g window-status-current-style "bg=#ccd0da,fg=#4c4f69"

setw -g window-status-format "  #[fg=#6c6f85]#I:#W  "
setw -g window-status-current-format "  #[fg=#d20f39]#I:#W  "

# Clock / bell
set -g clock-mode-colour "#1e66f5"
set -g bell-action any
set -g visual-bell on

# Status left/right
set -g status-left-length 40
set -g status-right-length 80

set -g status-left  "#[fg=#8839ef]  #S "
set -g status-right "#[fg=#6c6f85]%Y-%m-%d #[fg=#1e66f5]%H:%M "
##### --- CATPPUCCIN LATTE THEME END --- #####

set -g allow-rename off
setw -g automatic-rename off

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
bind | split-window -h

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.tmux.conf

bind j resize-pane -D 5
bind k resize-pane -U 5
bind l resize-pane -R 5
bind h resize-pane -L 5

bind -r m resize-pane -Z

bind M-c attach-session -c "#{pane_current_path}"

set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
