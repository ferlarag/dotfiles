# set -g default-terminal "tmux-256color"
# set -ag terminal-overrides ",xterm-255color:RGB"

##### --- ROSÉ PINE THEME START --- #####
# Status bar
set -g status on
set -g status-interval 5
set -g status-style "bg=#191724,fg=#e0def4"

# Messages
set -g message-style "bg=#26233a,fg=#e0def4"
set -g message-command-style "bg=#26233a,fg=#9ccfd8"

# Panes Dividers
set -g pane-border-style "fg=#26233a"
set -g pane-active-border-style "fg=#c4a7e7"

# Copy mode
setw -g mode-style "bg=#403d52,fg=#e0def4"

# Window list
setw -g window-status-separator ""
setw -g window-status-style "bg=#191724,fg=#908caa"
setw -g window-status-current-style "bg=#26233a,fg=#e0def4"

setw -g window-status-format "  #[fg=#908caa]#I:#W  "
setw -g window-status-current-format "  #[fg=#ebbcba]#I:#W  "

# Clock / bell
set -g clock-mode-colour "#9ccfd8"
set -g bell-action any
set -g visual-bell on

# Status left/right
set -g status-left-length 40
set -g status-right-length 80

set -g status-left  "#[fg=#c4a7e7]  #S "
set -g status-right "#[fg=#908caa]%Y-%m-%d #[fg=#9ccfd8]%H:%M "
##### --- ROSÉ PINE THEME END --- #####

set -g allow-rename off
setw -g automatic-rename off

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
bind | split-window -h

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.tmux.conf

bind j resize-pane -D 5
bind k resize-pane -U 5
bind l resize-pane -R 5
bind h resize-pane -L 5

bind -r m resize-pane -Z

bind M-c attach-session -c "#{pane_current_path}"

set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10

# Inactive pane border color
set -g pane-border-style fg=colour0
# Active pane border color
set -g pane-active-border-style fg=colour8

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
